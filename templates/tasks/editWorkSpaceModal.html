<!-- workspace/ProjectEditForm Component Modal -->
<div class="modal fade" id="workspaceProjectEditForm" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="workspaceProjectEditFormLabel" aria-hidden="true" data-state-initialize="false">
  <div class="modal-dialog modal-lg modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content position-relative">
      <div class="modal-header">
        <h6 class="modal-title mb-0 col-9">WorkSpace Edit Panel <span class="text-muted d-none">[WorkSpace #<span class="embed wowo_id"></span>]</span></h6>
        <div class="d-flex align-items-center gap-1 col-3 justify-content-end">
          <a class="btn btn-xs btn-info active workspace-toggle-btn" data-bs-target="#wsPaneOne" data-bs-toggle="collapse" role="button" aria-expanded="true" aria-controls="wsPaneOne" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Basic Settings"><i class="bi bi-gear"></i></a>
          <a class="btn btn-xs btn-info workspace-toggle-btn" data-bs-target="#wsPaneTwo" data-bs-toggle="collapse" role="button" aria-expanded="false" aria-controls="wsPaneTwo" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Project Lifecycle Settings"><i class="bi bi-arrow-repeat"></i></a>
          <a class="btn btn-xs btn-info me-2 workspace-toggle-btn" data-bs-target="#wsPaneThree" data-bs-toggle="collapse" aria-expanded="false" aria-controls="wsPaneThree" role="button" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Users & Departments"><i class="bi bi-people"></i></a>
          <a class="btn btn-xs btn-close me-2" data-bs-dismiss="modal" role="button" aria-label="Close" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="close"></a>
          <!--button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button-->
        </div>
      </div>
      <div class="modal-body">
        <div id="workspaceProjectEditFormResponse"></div>
        
        <!-- Forms Accordion Parent -->
        <div id="workspaceProjectEditFormAccordion">
          <!-- Basic Settings Form -->
          <div id="wsPaneOne" class="collapse show" data-bs-parent="#workspaceProjectEditFormAccordion">
            <form method="post" id="workspaceProjectEditFormForm">
                {% csrf_token %}
                {{ WorkSpaceEditForm.as_div }}
                <div class="row bg-body-secondary mt-3 p-2">
                  <div class="col-12 d-flex justify-content-end">
                    <input id="workSpaceBasicSettingsSaveBtn" class="btn btn-info btn-sm" type="submit" value="Save" data-bs-toggle="tooltip" data-bs-placement="left" data-bs-title="Submit form. Response with be displayed near top of form.">
                  </div>
                </div>
            </form>
          </div>

          <!-- Life Cycles Form -->
          <div id="wsPaneTwo" class="collapse" data-bs-parent="#workspaceProjectEditFormAccordion">
            <form method="post" id="workspaceLifeCycleForm">
                {% csrf_token %}
                {{ WorkSpaceLifeCyclesSubForm.as_div }}
                <div class="row bg-body-secondary mt-3 p-2">
                  <div class="col-12 d-flex justify-content-end">
                    <input id="workSpaceLifeCycleSaveBtn" class="btn btn-info btn-sm" type="submit" value="Save" data-bs-toggle="tooltip" data-bs-placement="left" data-bs-title="Submit form. Response with be displayed near top of form.">
                  </div>
                </div>
            </form>
          </div>

          <!-- User Settings Form -->
          <div id="wsPaneThree" class="collapse" data-bs-parent="#workspaceProjectEditFormAccordion">
            <form method="post" id="workspaceUserSettingsForm">
                {% csrf_token %}
                {{ WorkSpaceUserSettingsSubForm.as_div }}
                <div class="row bg-body-secondary mt-3 p-2">
                  <div class="col-12 d-flex justify-content-end">
                    <input id="workSpaceUserSettingsSaveBtn" class="btn btn-info btn-sm" type="submit" value="Save" data-bs-toggle="tooltip" data-bs-placement="left" data-bs-title="Submit form. Response with be displayed near top of form.">
                  </div>
                </div>
            </form>
          </div>
          
        </div>
      </div>
    </div>
  </div>
</div>
