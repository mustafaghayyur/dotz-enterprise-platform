<!-- workspace/ProjectEditForm Component Modal -->
<div class="modal fade" id="workspaceProjectEditForm" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="workspaceProjectEditFormLabel" aria-hidden="true" data-state-initialize="false">
  <div class="modal-dialog modal-lg modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content position-relative tabbed-view">
      
      <!-- File-style sticking out tab -->
      <button class="btn-sm btn-secondary vertical-file-tab shadow-sm" type="button" data-bs-toggle="collapse" data-bs-target="#projectCyclesCollapse" aria-expanded="false" aria-controls="projectCyclesCollapse">
        Project Cycles
      </button>

      <div class="modal-header">
        <h6>WorkSpace Edit Panel</h6>
        <h3 class="modal-title" id="workspaceProjectEditFormLabel"><div class="h6 text-muted d-none">[WorkSpace #<span id="wowo_id" ></span>]</div><span id="name" class="d-none"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="workspaceProjectEditFormResponse"></div>
        <form method="post" id="workspaceProjectEditFormForm">
            {% csrf_token %}
            
            <!-- Project Cycles Collapse Sub-Form -->
            <div class="collapse mb-4 mt-2" id="projectCyclesCollapse">
              <div class="card card-body bg-body-tertiary border-secondary shadow-sm">
                <h6 class="card-title text-info mb-3"><i class="bi bi-arrow-repeat"></i> Project Cycle Settings</h6>
                <div class="row g-2">
                  <input type="hidden" name="prlc_id" id="prlc_id">
                  <div class="col-md-6">
                    <label class="form-label small text-muted mb-0">Cycle Name</label>
                    <input type="text" class="form-control form-control-sm" name="cycle_name" placeholder="e.g. Phase 1">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small text-muted mb-0">Status</label>
                    <input type="text" class="form-control form-control-sm" name="cycle_status" placeholder="e.g. Active">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small text-muted mb-0">Start Date</label>
                    <input type="date" class="form-control form-control-sm" name="start_date">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small text-muted mb-0">End Date</label>
                    <input type="date" class="form-control form-control-sm" name="end_date">
                  </div>
                  <div class="col-12 mt-2">
                    <label class="form-label small text-muted mb-0">Description</label>
                    <textarea class="form-control form-control-sm" name="cycle_description" rows="2" placeholder="cycle details..."></textarea>
                  </div>
                </div>
              </div>
            </div>

            {{ workspaceForm.as_div }}
            <div class="row bg-body-secondary mt-3 p-2">
              <div class="col-12 d-flex justify-content-end">
                <input id="workSpaceEditFormSaveBtn" class="btn btn-info btn-sm" type="submit" value="Save" data-bs-toggle="tooltip" data-bs-placement="left" data-bs-title="Submit form. Response with be displayed near top of form.">
              </div>
            </div>
        </form>
      </div>
    </div>
  </div>
</div>
